plugins {
    id 'java'
    id 'maven-publish'
}


group = 'com.clubix'
version = '0.1.0-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenLocal()
    mavenCentral()
}

configurations.all {
    resolutionStrategy {
        force 'net.bytebuddy:byte-buddy:1.15.10'
        force 'net.bytebuddy:byte-buddy-agent:1.15.10'
    }
}

dependencies {
    // Spring BOM
    implementation platform('org.springframework.boot:spring-boot-dependencies:3.2.5')

    // Spring WebFlux
    implementation 'org.springframework.boot:spring-boot-starter-webflux'

    implementation 'com.usecase:clean-usecase:0.1.0-SNAPSHOT'

    // Lombok (forced 1.18.44+ for Java 24 compatibility)
    compileOnly 'org.projectlombok:lombok:1.18.44'
    annotationProcessor 'org.projectlombok:lombok:1.18.44'
    testCompileOnly 'org.projectlombok:lombok:1.18.44'
    testAnnotationProcessor 'org.projectlombok:lombok:1.18.44'

    testImplementation platform('org.junit:junit-bom:5.10.2')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testImplementation 'org.junit.platform:junit-platform-suite'
    testRuntimeOnly  'org.junit.platform:junit-platform-launcher'

    // Cucumber
    testImplementation platform('io.cucumber:cucumber-bom:7.21.1')
    testImplementation 'io.cucumber:cucumber-java'
    testImplementation 'io.cucumber:cucumber-junit-platform-engine'
    testImplementation 'io.cucumber:cucumber-picocontainer'

    // Reactor Test
    testImplementation 'io.projectreactor:reactor-test'

    // Mockito (explicit version for Java 24 compatibility)
    testImplementation 'org.mockito:mockito-core:5.14.2'
}

test {
    useJUnitPlatform()
    jvmArgs(
            "-javaagent:${configurations.testRuntimeClasspath.find { it.name.contains('byte-buddy-agent') }}",
            '-XX:+EnableDynamicAgentLoading',
            '--add-opens=java.base/java.lang=ALL-UNNAMED',
            '--add-opens=java.base/java.lang.reflect=ALL-UNNAMED'
    )
    testLogging {
        showStandardStreams = true
        events "passed", "skipped", "failed"
    }
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
        }
    }
    repositories {
        mavenLocal()
    }
}
